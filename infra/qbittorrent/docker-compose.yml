services:
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
      - WEBUI_PORT=5080
    volumes:
      - downloads:/downloads
      - qbt-config:/config
    ports:
      - "${QBITTORRENT_PORT:-5080}:5080"
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    volumes:
      - downloads:/downloads:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "${FILE_SERVER_PORT:-8081}:80"
    restart: unless-stopped

volumes:
  downloads:
  qbt-config:
