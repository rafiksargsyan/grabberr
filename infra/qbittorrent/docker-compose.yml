services:
  gluetun:
    image: qmcgaw/gluetun:v3.41.1
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - VPN_SERVICE_PROVIDER=${VPN_SERVICE_PROVIDER:-protonvpn}
      - VPN_TYPE=${VPN_TYPE:-wireguard}
      - WIREGUARD_PRIVATE_KEY=${WIREGUARD_PRIVATE_KEY}
      - OPENVPN_USER=${OPENVPN_USER}
      - OPENVPN_PASSWORD=${OPENVPN_PASSWORD}
      - SERVER_COUNTRIES=${VPN_SERVER_COUNTRIES:-Netherlands}
    ports:
      - "${QBITTORRENT_PORT:-5080}:5080"
    restart: unless-stopped

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:5.1.4
    network_mode: "service:gluetun"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
      - WEBUI_PORT=5080
    volumes:
      - downloads:/downloads
      - qbt-config:/config
    depends_on:
      - gluetun
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    volumes:
      - downloads:/downloads:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "${NGINX_PORT:-8083}:80"
    restart: unless-stopped

  transfer-agent:
    build: ../transfer-agent
    environment:
      - TRANSFER_AGENT_BUCKET=${S3_BUCKET}
      - RCLONE_CONFIG_S3_TYPE=s3
      - RCLONE_CONFIG_S3_PROVIDER=Other
      - RCLONE_CONFIG_S3_ACCESS_KEY_ID=${S3_ACCESS_KEY_ID}
      - RCLONE_CONFIG_S3_SECRET_ACCESS_KEY=${S3_SECRET_ACCESS_KEY}
      - RCLONE_CONFIG_S3_REGION=${S3_REGION}
      - RCLONE_CONFIG_S3_ENDPOINT=${S3_ENDPOINT}
      - RCLONE_UPLOAD_CONCURRENCY=${RCLONE_UPLOAD_CONCURRENCY:-4}
      - RCLONE_CHUNK_SIZE=${RCLONE_CHUNK_SIZE:-32M}
      - RCLONE_BUFFER_SIZE=${RCLONE_BUFFER_SIZE:-32M}
      - RCLONE_STATS_INTERVAL=${RCLONE_STATS_INTERVAL:-30s}
      - RCLONE_BWLIMIT=${RCLONE_BWLIMIT:-500k}
    volumes:
      - downloads:/downloads:ro
    ports:
      - "${TRANSFER_AGENT_PORT:-8081}:8080"
    restart: unless-stopped
    extra_hosts:                                                                                                                                                                             
      - "minio.local:host-gateway"
volumes:
  downloads:
  qbt-config:
