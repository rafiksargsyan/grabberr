spring.application.name=grabberr-main-ctx

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/grabberr}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=update
spring.sql.init.mode=always
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

grabberr.qbittorrent.url=${QBITTORRENT_URL:http://localhost:5080}
grabberr.qbittorrent.username=${QBITTORRENT_USERNAME:admin}
grabberr.qbittorrent.password=${QBITTORRENT_PASSWORD:admin@123}

grabberr.transfer-agent.url=${TRANSFER_AGENT_URL:http://localhost:8081}

grabberr.s3.access-key-id=${S3_ACCESS_KEY_ID}
grabberr.s3.secret-access-key=${S3_SECRET_ACCESS_KEY}
grabberr.s3.region=${S3_REGION:eu-central-003}
grabberr.s3.endpoint=${S3_ENDPOINT:https://s3.eu-central-003.backblazeb2.com}
grabberr.s3.bucket=${S3_BUCKET}

spring.security.oauth2.resourceserver.jwt.issuer-uri=https://securetoken.google.com/${FIREBASE_PROJECT_ID:sprite-6193a}

# db-scheduler requires 'scheduled_tasks' table (see db-scheduler DDL docs)
db-scheduler.threads=2

grabberr.metadata-poll-interval=PT30S
grabberr.queued-timeout=${GRABBERR_QUEUED_TIMEOUT:PT2H}
grabberr.fetching-metadata-timeout=${GRABBERR_FETCHING_METADATA_TIMEOUT:PT5M}
grabberr.download-poll-interval=PT60S
grabberr.download-timeout=PT24H
grabberr.transfer-min-speed-bps=${GRABBERR_TRANSFER_MIN_SPEED_BPS:1048576}
grabberr.transfer-backoff-initial-delay=${GRABBERR_TRANSFER_BACKOFF_INITIAL_DELAY:PT1M}
grabberr.transfer-backoff-max-delay=${GRABBERR_TRANSFER_BACKOFF_MAX_DELAY:PT30M}
grabberr.min-free-space-bytes=${GRABBERR_MIN_FREE_SPACE_BYTES:10737418240}
grabberr.downloads-base-url=${GRABBERR_DOWNLOADS_BASE_URL:http://localhost:8083}
grabberr.downloaded-file-ttl=${GRABBERR_DOWNLOADED_FILE_TTL:PT1H}
grabberr.cache-ttl=${GRABBERR_CACHE_TTL:P15D}
