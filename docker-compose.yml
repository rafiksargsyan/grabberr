services:
  backend:
    image: rafiksargsyan/grabberr-backend:latest
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
      S3_REGION: ${S3_REGION:-eu-central-003}
      S3_ENDPOINT: ${S3_ENDPOINT:-https://s3.eu-central-003.backblazeb2.com}
      S3_BUCKET: ${S3_BUCKET}
      QBITTORRENT_URL: ${QBITTORRENT_URL}
      QBITTORRENT_USERNAME: ${QBITTORRENT_USERNAME:-admin}
      QBITTORRENT_PASSWORD: ${QBITTORRENT_PASSWORD}
      TRANSFER_AGENT_URL: ${TRANSFER_AGENT_URL}
      GRABBERR_DOWNLOADS_BASE_URL: ${GRABBERR_DOWNLOADS_BASE_URL}
    ports:
      - "${BACKEND_PORT:-8082}:8080"

  frontend:
    image: rafiksargsyan/grabberr-frontend:latest
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - backend
